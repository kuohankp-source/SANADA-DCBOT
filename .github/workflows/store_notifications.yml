name: Store Daily Notifications

on:
  repository_dispatch:
    types: [fire_store_notifications]
  workflow_dispatch:

jobs:
  run-notifications:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Notifications Script
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
          DISCORD_WEBHOOK_BEITUN: ${{ secrets.DISCORD_WEBHOOK_BEITUN }}
          DISCORD_WEBHOOK_ZHONGYOU: ${{ secrets.DISCORD_WEBHOOK_ZHONGYOU }}
          DISCORD_WEBHOOK_SONGZHU: ${{ secrets.DISCORD_WEBHOOK_SONGZHU }}
        run: python store_notifications.py
