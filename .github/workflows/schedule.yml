name: Multi-Store Handover Report

on:
  # 1. 接收 GAS 的精準喚醒訊號
  repository_dispatch:
    types: [fire_handover_report]
    
  # 2. 保留手動按鈕
  workflow_dispatch:
  
  # (把原本的 schedule: cron 整段刪掉，不讓 GitHub 自己排隊了)

jobs:
  run-handover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Multi-Store Script
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
          DISCORD_WEBHOOK_ZHONGYOU: ${{ secrets.DISCORD_WEBHOOK_ZHONGYOU }}
          DISCORD_WEBHOOK_BEITUN: ${{ secrets.DISCORD_WEBHOOK_BEITUN }}
          DISCORD_WEBHOOK_SONGZHU: ${{ secrets.DISCORD_WEBHOOK_SONGZHU }}
        run: python main.py
