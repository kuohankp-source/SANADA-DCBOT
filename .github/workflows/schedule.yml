name: Multi-Store Handover Report

on:
  schedule:
    # 台灣時間 05:51 (21:51 UTC)
    - cron: '51 21 * * *'
  
  workflow_dispatch:

jobs:
  run-handover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Multi-Store Script
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
          DISCORD_WEBHOOK_ZHONGYOU: ${{ secrets.DISCORD_WEBHOOK_ZHONGYOU }}
          DISCORD_WEBHOOK_BEITUN: ${{ secrets.DISCORD_WEBHOOK_BEITUN }}
          DISCORD_WEBHOOK_SONGZHU: ${{ secrets.DISCORD_WEBHOOK_SONGZHU }}
        run: python main.py
