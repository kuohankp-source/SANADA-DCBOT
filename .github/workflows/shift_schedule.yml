name: Daily Shift Schedule

on:
  # 1. 外部訊號觸發 (GAS 會用這個叫醒它)
  repository_dispatch:
    types: [fire_shift_schedule]
    
  # 2. 保留手動按鈕
  workflow_dispatch:
  
  # (你可以把原本的 schedule 整個刪掉，因為我們以後不需要 GitHub 自己賴床的鬧鐘了)

jobs:
  run-shift-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Schedule Script
      env:
        # 共用 Google 鑰匙
        GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        # 班表專屬的 Discord 頻道網址
        DISCORD_SCHEDULE_WEBHOOK: ${{ secrets.DISCORD_SCHEDULE_WEBHOOK }}
      # 💡 這裡指定執行我們剛建好的新程式
      run: python schedule_bot.py
