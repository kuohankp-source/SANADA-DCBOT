name: Daily Discord Report

on:
  schedule:
    # GitHub 使用 UTC 時間。台灣時間 (CST) 是 UTC+8。
    # 如果你想要在每天清晨 04:00 (台灣時間) 執行，這裡要減 8 小時，也就是 20:00 (UTC)
    # 格式為: 分 時 日 月 星期
    - cron: '0 20 * * *'  
  
  # 允許你可以在 GitHub 網頁上手動點擊執行 (方便測試)
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Python script
      env:
        # 將 GitHub Secrets 注入為系統環境變數，給 Python 讀取
        GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      run: python main.py
